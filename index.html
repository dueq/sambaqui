      overlay.remove();
      refreshTutorialPage = null;
    }
  });

  let currentTutorialPage = 0;
  const titleEl = overlay.querySelector('#tut-title');
  const bodyEl = overlay.querySelector('#tut-body');
  const indicatorEl = overlay.querySelector('#tut-page-indicator');
  const prevBtn = overlay.querySelector('#tut-prev-btn');
  const nextBtn = overlay.querySelector('#tut-next-btn');


  refreshTutorialPage = () => {
    const pagesData = translations[currentLang].tutorialPages || translations['EN'].tutorialPages;
    const page = pagesData[currentTutorialPage];
    titleEl.textContent = page.title;
    bodyEl.innerHTML = page.text;
    indicatorEl.textContent = `${currentTutorialPage + 1} / ${pagesData.length}`;
    
    prevBtn.disabled = currentTutorialPage === 0;
    prevBtn.textContent = t('tutorialPrev');
    
    if (currentTutorialPage === pagesData.length - 1) {
      nextBtn.textContent = t('tutorialPlay');
    } else {
      nextBtn.textContent = t('tutorialNext');
    }
  };
  
  prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (currentTutorialPage > 0) { currentTutorialPage--; refreshTutorialPage(); }
  });
  
  nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const pagesData = translations[currentLang].tutorialPages || translations['EN'].tutorialPages;
    if (currentTutorialPage < pagesData.length - 1) {
      currentTutorialPage++;
      refreshTutorialPage();
    } else {
      overlay.remove();
      refreshTutorialPage = null;
      if (onCloseCallback) onCloseCallback();
    }
  });
  
  refreshTutorialPage();
}

// ═══════════════════════════════════════════════════════════════
//  SECTION 11b — CUSTOM GAME MODE
// ═══════════════════════════════════════════════════════════════
let customMode = false;

const customSetup = {
  pieces: {}, 
  lastMoved: null,
};

const MAX_PIECES_PER_PLAYER = 4;

function enterCustomMode() {
  if (state.animating) return;
  customMode = 'place-p1';
  customSetup.pieces = {};
  customSetup.lastMoved = null;

  vsAI = false;
  window.isWaitingForContinue = false;
  document.body.classList.remove('clickable-restart');
  clearResultBanner();

  customModeBtn.classList.add('active');
  modeToggleBtn.classList.remove('active');
  customToolbar.classList.remove('hidden');
  navControls.classList.add('hidden');
  statsBarEl.classList.add('hidden');
  customPlayBtn.classList.add('hidden');

  updateCustomPhaseUI();
  renderCustomBoard();
  setStatus(currentLang === 'PT'
    ? 'Modo Custom: coloque 4 peças brancas no tabuleiro.'
    : 'Custom Mode: place 4 white pieces on the board.', 'sneaking');
}

function exitCustomMode() {
  customMode = false;
  customSetup.pieces = {};
  customSetup.lastMoved = null;

  customModeBtn.classList.remove('active');
  customToolbar.classList.add('hidden');
  customPlayBtn.classList.add('hidden');

  restartGame(true);
}

function countCustomPieces(player) {
  return Object.values(customSetup.pieces).filter(p => p.player === player).length;
}

function updateCustomPhaseUI() {
  const p1Count = countCustomPieces(1);
  const p2Count = countCustomPieces(2);

  customPhaseLabel.innerHTML = '';

  customPhaseDots.innerHTML = '';
  for (let i = 0; i < MAX_PIECES_PER_PLAYER; i++) {
    const dot = document.createElement('div');
    const filled = i < p1Count;
    dot.className = 'custom-phase-dot' + (filled ? ' filled-p1' : '');
    if (!filled && customMode === 'place-p1') dot.classList.add('active-step');
    customPhaseDots.appendChild(dot);
  }

  const sep = document.createElement('div');
  sep.style.cssText = 'width:1px;height:10px;background:rgba(122,184,192,0.25);flex-shrink:0;';
  customPhaseDots.appendChild(sep);

  for (let i = 0; i < MAX_PIECES_PER_PLAYER; i++) {
    const dot = document.createElement('div');
    const filled = i < p2Count;
    dot.className = 'custom-phase-dot' + (filled ? ' filled-p2' : '');
    if (!filled && customMode === 'place-p2') dot.classList.add('active-step');
    customPhaseDots.appendChild(dot);
  }

  if (customMode === 'ready') {
    customPlayBtn.classList.remove('hidden');
    customPlayBtn.textContent = currentLang === 'PT' ? '▶ Jogar' : '▶ Play';
  } else {
    customPlayBtn.classList.add('hidden');
  }
}

function renderCustomBoard() {
  for (const label of LABELS) {
    const cell = cellEls[label];
    const piece = customSetup.pieces[label];

    cell.className = 'cell' + (((labelToRC(label)[0] + labelToRC(label)[1]) % 2 === 1) ? ' dark-sq' : '');
    cell.innerHTML = '';

    const coord = document.createElement('div');
    coord.className = 'cell-label';
    coord.textContent = label;
    cell.appendChild(coord);

    if (customMode === 'place-p1' || customMode === 'place-p2') {
      if (piece) {
        const el = document.createElement('div');
        el.className = `piece p${piece.player} active-piece`;
        cell.classList.add('selectable');
        cell.appendChild(el);
      } else {
        if (customMode === 'place-p1' && countCustomPieces(1) < MAX_PIECES_PER_PLAYER) {
          cell.classList.add('custom-place-p1', 'selectable');
        } else if (customMode === 'place-p2' && countCustomPieces(2) < MAX_PIECES_PER_PLAYER) {
          cell.classList.add('custom-place-p2', 'selectable');
        }
      }
    } else if (customMode === 'select-last' || customMode === 'ready') {
      if (piece) {
        const el = document.createElement('div');
        const isLastSelected = customSetup.lastMoved === label;
        if (isLastSelected) {
          el.className = `piece p${piece.player} selected-piece`;
          cell.classList.add('custom-last-selected');
        } else {
          el.className = `piece p${piece.player} active-piece`;
          cell.classList.add('custom-last-candidate', 'selectable', 'custom-select-last');
        }
        cell.appendChild(el);
      }
    }
  }
}

function handleCustomClick(label) {
  if (!customMode) return;

  if (customMode === 'ready') {
    const piece = customSetup.pieces[label];
    if (!piece) return;
    customSetup.lastMoved = label;
    updateCustomPhaseUI();
    renderCustomBoard();
    const owner = piece.player === 1 ? (currentLang === 'PT' ? 'branca' : 'white') : (currentLang === 'PT' ? 'preta' : 'black');
    setStatus(currentLang === 'PT'
      ? `Peça ${owner} em ${label} jogou por último. Pronto!`
      : `${owner.charAt(0).toUpperCase() + owner.slice(1)} piece on ${label} moved last. Ready!`, true);
    return;
  }

  const piece = customSetup.pieces[label];

  if (customMode === 'place-p1') {
    if (piece) {
      if (piece.player === 1) {
        delete customSetup.pieces[label];
        updateCustomPhaseUI();
        renderCustomBoard();
        setStatus(currentLang === 'PT' ? `Peça removida de ${label}.` : `Piece removed from ${label}.`, 'sneaking');
      }
      return;
    }
    customSetup.pieces[label] = { player: 1 };
    const count = countCustomPieces(1);
    if (count === MAX_PIECES_PER_PLAYER) {
      customMode = 'place-p2';
      setStatus(currentLang === 'PT' ? 'Agora coloque 4 peças pretas.' : 'Now place 4 black pieces.', 'sneaking');
    } else {
      const need = MAX_PIECES_PER_PLAYER - count;
      setStatus(currentLang === 'PT'
        ? `${need} peça${need !== 1 ? 's' : ''} branca${need !== 1 ? 's' : ''} restante${need !== 1 ? 's' : ''}.`
        : `${need} white piece${need !== 1 ? 's' : ''} remaining.`, 'sneaking');
    }
    updateCustomPhaseUI();
    renderCustomBoard();

  } else if (customMode === 'place-p2') {
    if (piece) {
      if (piece.player === 2) {
        delete customSetup.pieces[label];
        updateCustomPhaseUI();
        renderCustomBoard();
        setStatus(currentLang === 'PT' ? `Peça removida de ${label}.` : `Piece removed from ${label}.`, 'sneaking');
      } else if (piece.player === 1) {
        delete customSetup.pieces[label];
        customMode = 'place-p1';
        updateCustomPhaseUI();
        renderCustomBoard();
        setStatus(currentLang === 'PT' ? 'Voltou para colocação de peças brancas.' : 'Back to placing white pieces.', 'sneaking');
      }
      return;
    }
    customSetup.pieces[label] = { player: 2 };
    const count = countCustomPieces(2);
    if (count === MAX_PIECES_PER_PLAYER) {
      customMode = 'select-last';
      setStatus(currentLang === 'PT'
        ? 'Clique na peça que jogou por último para definir atividade.'
        : 'Click the last moved piece to define which pieces are active.', 'sneaking');
    } else {
      const need = MAX_PIECES_PER_PLAYER - count;
      setStatus(currentLang === 'PT'
        ? `${need} peça${need !== 1 ? 's' : ''} preta${need !== 1 ? 's' : ''} restante${need !== 1 ? 's' : ''}.`
        : `${need} black piece${need !== 1 ? 's' : ''} remaining.`, 'sneaking');
    }
    updateCustomPhaseUI();
    renderCustomBoard();

  } else if (customMode === 'select-last') {
    if (!piece) return;
    customSetup.lastMoved = label;
    customMode = 'ready';
    updateCustomPhaseUI();
    renderCustomBoard();
    const owner = piece.player === 1 ? (currentLang === 'PT' ? 'branca' : 'white') : (currentLang === 'PT' ? 'preta' : 'black');
    setStatus(currentLang === 'PT'
      ? `Peça ${owner} em ${label} jogou por último. Pronto!`
      : `${owner.charAt(0).toUpperCase() + owner.slice(1)} piece on ${label} moved last. Ready!`, true);
  }
}

function customUndoPlacement() {
  if (!customMode || customMode === 'ready') return;

  let lastPlaced = null;
  if (customMode === 'place-p1' || customMode === 'place-p2') {
    const targetPlayer = customMode === 'place-p1' ? 1 : 2;
    for (const lbl of LABELS) {
      if (customSetup.pieces[lbl] && customSetup.pieces[lbl].player === targetPlayer) {
        lastPlaced = lbl;
      }
    }
    if (lastPlaced) {
      delete customSetup.pieces[lastPlaced];
    } else if (customMode === 'place-p2') {
      customMode = 'place-p1';
      for (const lbl of LABELS) {
        if (customSetup.pieces[lbl] && customSetup.pieces[lbl].player === 1) lastPlaced = lbl;
      }
      if (lastPlaced) delete customSetup.pieces[lastPlaced];
    }
  } else if (customMode === 'select-last') {
    customMode = 'place-p2';
    for (const lbl of LABELS) {
      if (customSetup.pieces[lbl] && customSetup.pieces[lbl].player === 2) lastPlaced = lbl;
    }
    if (lastPlaced) delete customSetup.pieces[lastPlaced];
  }

  updateCustomPhaseUI();
  renderCustomBoard();
  const phaseMsg = customMode === 'place-p1'
    ? (currentLang === 'PT' ? 'Colocando peças brancas.' : 'Placing white pieces.')
    : customMode === 'place-p2'
      ? (currentLang === 'PT' ? 'Colocando peças pretas.' : 'Placing black pieces.')
      : (currentLang === 'PT' ? 'Selecione a última peça movida.' : 'Select the last moved piece.');
  setStatus(phaseMsg, 'sneaking');
}

function commitCustomPosition() {
  if (!customSetup.lastMoved || !customSetup.pieces[customSetup.lastMoved]) return;

  const rawPieces = customSetup.pieces;
  const lastMovedLabel = customSetup.lastMoved;
  const lastMovedPlayer = rawPieces[lastMovedLabel].player;
  const opponent = lastMovedPlayer === 1 ? 2 : 1;

  const builtPieces = {};
  for (const [lbl, p] of Object.entries(rawPieces)) {
    builtPieces[lbl] = { player: p.player, active: false };
  }

  const visibleEnemies = computeVisibleMoveableEnemies(lastMovedLabel, builtPieces, lastMovedPlayer);

  let nextPlayer;
  if (visibleEnemies.length > 0) {
    for (const sq of visibleEnemies) {
      builtPieces[sq] = { ...builtPieces[sq], active: true };
    }
    nextPlayer = opponent;
  } else {
    builtPieces[lastMovedLabel] = { ...builtPieces[lastMovedLabel], active: true };
    nextPlayer = lastMovedPlayer;
  }

  customMode = false;
  customModeBtn.classList.remove('active');
  customToolbar.classList.add('hidden');
  customPlayBtn.classList.add('hidden');

  window.isWaitingForContinue = false;
  document.body.classList.remove('clickable-restart');
  clearResultBanner();

  vsAI = false;  
  modeToggleBtn.textContent = t('newGame');
  humanStreak = 0;

  Object.assign(state, {
    currentPlayer: nextPlayer,
    selectedSquare: null,
    currentMoves: [],
    gameOver: false,
    winLine: null,
    sneaking: visibleEnemies.length === 0,
    sneakingSquare: visibleEnemies.length === 0 ? lastMovedLabel : null,
    losSquares: [],
    animating: false,
    highlightingActive: false,
    pieces: builtPieces,
    history: new Set(),
  });
  state.history.add(serialiseState(state.pieces, state.currentPlayer));

  timeline.length = 0;
  timelineIndex = -1;
  moveLog.length = 0;
  pushTimeline();
  updateMetaDisplay();

  navControls.classList.remove('hidden');

  if (state.sneaking) {
    setStatus(t('chainNoEnemies'), 'sneaking');
    selectPiece(state.sneakingSquare);
  } else {
    setStatus(t('selectActive'));
  }
  render();
}

customModeBtn.addEventListener('click', () => {
  if (customMode) {
    exitCustomMode();
  } else {
    modeToggleBtn.classList.remove('active');
    enterCustomMode();
  }
});


customPlayBtn.addEventListener('click', () => commitCustomPosition());

// ═══════════════════════════════════════════════════════════════
//  SECTION 12 — INITIALIZATION LOOP
// ═══════════════════════════════════════════════════════════════

pushTimeline();
render();
updateMetaDisplay();

function render() {
  if (customMode) {
    renderCustomBoard();
    return;
  }

  const humanTurn = state.currentPlayer === humanPlayerColor || !vsAI;
  if (state.currentPlayer === 1) {
    tagP1.classList.add('active');
    tagP2.classList.remove('active');
  } else {
    tagP1.classList.remove('active');
    tagP2.classList.add('active');
  }
  const pathSquares = new Set();
  
  for (const m of state.currentMoves) {
    if (!m.blocked) {
      for (const sq of m.path) pathSquares.add(sq);
    }
  }

  for (const label of LABELS) {
    const cell = cellEls[label];
    const piece = state.pieces[label];
    
    cell.className = 'cell' + (((labelToRC(label)[0] + labelToRC(label)[1]) % 2 === 1) ? ' dark-sq' : '');
    cell.innerHTML = '';

    if (!vsAI) {
      const coord = document.createElement('div');
      coord.className = 'cell-label';
      coord.textContent = label;
      cell.appendChild(coord);
    }
    const isSelected = state.selectedSquare === label;
    const move = state.currentMoves.find(m => m.landing === label);

    if (state.winLine && state.winLine.includes(label)) {
      cell.classList.add('win-line');
    }
    else if (state.highlightingActive && piece && piece.player === state.currentPlayer && piece.active && !state.selectedSquare) {
      cell.classList.add('landing');
    }
    else if (state.losSquares.includes(label)) {
      if (!move) cell.classList.add('los-target');
    }
    else if (move) {
      cell.classList.add(move.blocked ? 'blocked-landing' : 'landing');
    }
    else if (pathSquares.has(label)) {
      cell.classList.add('path');
    }

    if (piece) {
      const el = document.createElement('div');
      if (isSelected) {
        el.className = `piece p${piece.player} selected-piece`;
        cell.classList.add('selected');
      } else if (state.sneaking && label === state.sneakingSquare) {
        el.className = `piece p${piece.player} sneaking`;
      } else if (piece.active) {
        el.className = `piece p${piece.player} active-piece`;
        if (piece.player === state.currentPlayer && !state.gameOver && humanTurn && !window.isWaitingForContinue) {
          cell.classList.add('selectable');
        }
      } else {
        el.className = `piece p${piece.player} inactive`;
      }
      cell.appendChild(el);
    }

    if (move && !piece && !state.gameOver) {
      const arrow = document.createElement('div');
      arrow.className = `arrow-hint${move.blocked ? ' blocked' : ''}`;
      arrow.textContent = move.arrow;
      cell.appendChild(arrow);
      if (!move.blocked && humanTurn && !window.isWaitingForContinue) cell.classList.add('selectable');
    }
  }
  updateNavButtons();
}

function setStatus(msg, variant = false) {
  statusEl.textContent = msg;
  statusEl.classList.remove('highlight', 'warn', 'sneaking');
  if (variant === true) statusEl.classList.add('highlight');
  if (variant === 'warn') statusEl.classList.add('warn');
  if (variant === 'sneaking') statusEl.classList.add('sneaking');
}

function setMode(aiMode) {
  if (state.animating) return;

  if (customMode) {
    customMode = false;
    customModeBtn.classList.remove('active');
    customToolbar.classList.add('hidden');
    customPlayBtn.classList.add('hidden');
  }

  vsAI = aiMode;
  
  window.isWaitingForContinue = false;
  document.body.classList.remove('clickable-restart');

  modeToggleBtn.textContent = vsAI ? t('practice') : t('newGame');
  restartGame(true);
}

function restartGame(forceResetColor) {
  if (state.animating) return;
  
  window.isWaitingForContinue = false;
  document.body.classList.remove('clickable-restart');
  clearResultBanner();

  if (vsAI) {
    if (forceResetColor) {
      humanPlayerColor = 1;
      humanStreak = 0;
      window.achievedNewBest = false;
    } else {
      humanPlayerColor = humanPlayerColor === 1 ? 2 : 1;
    }
  }

  Object.assign(state, {
    currentPlayer: 1,
    selectedSquare: null,
    currentMoves: [],
    gameOver: false,
    winLine: null,
    sneaking: false,
    sneakingSquare: null,
    losSquares: [],
    animating: false,
    highlightingActive: false,
    pieces: makeInitialPieces(),
    history: new Set(),
  });
  state.history.add(serialiseState(state.pieces, state.currentPlayer));

  timeline.length = 0;
  timelineIndex = -1;
  moveLog.length = 0;
  pushTimeline();
  updateMetaDisplay();

  if (vsAI && state.currentPlayer !== humanPlayerColor) {
    setStatus(t('calculatingOpening'), 'highlight');
    triggerAIMove();
  } else {
    setStatus(t('selectActive'));
  }
  render();
}

function updateMetaDisplay() {
  statStreakEl.textContent = humanStreak + 1;
  statHighEl.textContent = highScore;

  if (vsAI) {
    statsBarEl.classList.remove('hidden');
    
    if (window.achievedNewBest) {
      statLvlLabel.textContent = currentLang === 'PT' ? "★\uFE0E Nível " : "★\uFE0E Level ";
    } else {
      statLvlLabel.textContent = t('level');
    }
    statBestLabel.textContent = t('best');

    if (!state.gameOver) {
      if (humanPlayerColor === 1) {
        labelP1.textContent = t('playerYou');
        labelP2.textContent = t('computer');
      } else {
        labelP1.textContent = t('computer');
        labelP2.textContent = t('playerYou');
      }
    }
  } else {
    statsBarEl.classList.add('hidden');
    if (!state.gameOver) {
      labelP1.textContent = t('player1');
      labelP2.textContent = t('player2');
    }
  }

  modeToggleBtn.textContent = vsAI ? t('practice') : t('newGame');
  openTutorialBtn.textContent = t('tutorial');
  langToggleBtn.textContent = t('language');
  footerSupportLink.textContent = t('supportLink');
  footerShareLink.textContent = t('shareLink');

  customModeBtn.textContent = currentLang === 'PT' ? 'Custom' : 'Custom';
}

function toggleLanguage() {
  currentLang = currentLang === 'EN' ? 'PT' : 'EN';
  localStorage.setItem('sambaqui_lang', currentLang);
  applyLanguageSwitch();
}

function applyLanguageSwitch() {
  updateMetaDisplay();
  if (state.gameOver) {
    const victory = checkVictory(state.pieces);
    if (victory && vsAI) {
      if (victory.winner === humanPlayerColor) {
        if (humanPlayerColor === 1) {
          labelP1.textContent = currentLang === 'PT' ? "Jogador Venceu" : "Player Wins";
        } else {
          labelP2.textContent = currentLang === 'PT' ? "Jogador Venceu" : "Player Wins";
        }
        setStatus("", true);
      } else {
        if (humanPlayerColor === 1) {
          labelP2.textContent = currentLang === 'PT' ? "Computador Venceu" : "Computer Wins";
        } else {
          labelP1.textContent = currentLang === 'PT' ? "Computador Venceu" : "Computer Wins";
        }
        setStatus(currentLang === 'PT' ? `Computador Venceu.` : `Computer Wins.`, 'warn');
      }
    } else if (!vsAI) {
      setStatus(t('playerWins', { winner: checkVictory(state.pieces)?.winner ?? '' }), true);
    }
  } else if (state.sneaking) {
    setStatus(t('chainNoEnemies'), 'sneaking');
  } else if (vsAI && state.currentPlayer !== humanPlayerColor) {
    setStatus(t('thinking'), 'highlight');
  } else if (state.selectedSquare) {
    const raw = state.currentMoves;
    const free = raw.filter(m => !m.blocked).length;
    const blocked = raw.filter(m => m.blocked).length;
    if (raw.length === 0) {
      setStatus(t('noMovesAvailable', { label: state.selectedSquare }));
    } else if (free === 0) {
      setStatus(t('forbiddenByNovelty', { label: state.selectedSquare, blocked }), 'warn');
    } else {
      const suffix = blocked > 0 ? t('forbiddenSuffix', { blocked }) : '';
      const prefix = state.sneaking ? t('chainMovePrefix') : '';
      const pluralStr = free !== 1 ? 's' : '';
      setStatus(t('legalMoves', { prefix, label: state.selectedSquare, free, plural: pluralStr, suffix }), state.sneaking ? 'sneaking' : true);
    }
  } else {
    setStatus(t('selectActive'));
  }

  const activeBanner = document.getElementById('result-banner');
  if (activeBanner && timelineIndex !== -1) {
    const winner = timeline[timelineIndex].winner;
    const bannerTextEl = activeBanner.querySelector('.banner-text');
    const bannerBtnEl = activeBanner.querySelector('.new-game-btn');
    
    if (bannerTextEl) {
      if (!vsAI) {
        bannerTextEl.textContent = t('playerWinsBanner', { winner: winner });
      } else if (winner === humanPlayerColor) {
        const pluralStr = humanStreak !== 1 ? 's' : '';
        bannerTextEl.textContent = t('humanWinsStreakBanner', { streak: humanStreak, plural: pluralStr });
      } else {
        const pluralStr = humanStreak !== 1 ? 's' : '';
        bannerTextEl.textContent = t('humanLosesStreakBanner', { streak: humanStreak, plural: pluralStr });
      }
    }
    if (bannerBtnEl) bannerBtnEl.textContent = t('startNewGame');
  }

  const openTutorial = document.getElementById('tutorial-modal');
  if (openTutorial && typeof refreshTutorialPage === 'function') {
    refreshTutorialPage();
  }
}

document.addEventListener('click', (e) => {
  if (customMode) return;  
  if (window.isWaitingForContinue) {
    if (e.target.closest('.menu-controls') || e.target.closest('.nav-btn') || e.target.closest('#result-banner')) return;

    e.preventDefault();
    e.stopPropagation();
    
    window.isWaitingForContinue = false;
    document.body.classList.remove('clickable-restart');
    
    restartGame(false);
  }
});

undoBtn.addEventListener('click', () => { if (!undoBtn.disabled && !vsAI) restoreTimeline(timelineIndex - 1); });
redoBtn.addEventListener('click', () => { if (!redoBtn.disabled && !vsAI) restoreTimeline(timelineIndex + 1); });
modeToggleBtn.addEventListener('click', () => setMode(!vsAI));
openTutorialBtn.addEventListener('click', () => launchTutorial());
langToggleBtn.addEventListener('click', toggleLanguage);

footerShareLink.addEventListener('click', () => {
  navigator.clipboard.writeText(window.location.href).then(() => {
    toastMsgEl.textContent = t('linkCopied');
    toastMsgEl.style.opacity = '1';
    setTimeout(() => { toastMsgEl.style.opacity = '0'; }, 2000);
  }).catch(() => {
    toastMsgEl.textContent = window.location.href;
    toastMsgEl.style.opacity = '1';
    setTimeout(() => { toastMsgEl.style.opacity = '0'; }, 4000);
  });
});
